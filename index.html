            function updateTimer() {
                const now = new Date();
                let targetIftar = null;
                let targetTimeString = "";

                for (let i = 0; i < iftarTimes.length; i++) {
                    // String birleştirme ile en güvenli tarih oluşturma yöntemi
                    const dateString = iftarTimes[i].date + " " + iftarTimes[i].time;
                    const iftarDate = new Date(dateString);
                    
                    if (now < iftarDate) {
                        targetIftar = iftarDate;
                        targetTimeString = iftarTimes[i].time.substring(0, 5);
                        break;
                    }
                }

                if (!targetIftar) {
                    document.getElementById('target-info').innerText = "Ramazan ayı iftar saatleri tamamlandı.";
                    document.getElementById('timer-box').style.display = 'none';
                    return;
                }

                document.getElementById('target-info').innerText = "Sıradaki İftar Vakti: " + targetTimeString;

                const diff = targetIftar - now;

                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById('hours').innerText = (hours < 10 ? "0" : "") + hours;
                document.getElementById('minutes').innerText = (minutes < 10 ? "0" : "") + minutes;
                document.getElementById('seconds').innerText = (seconds < 10 ? "0" : "") + seconds;

                if (hours === 0 && minutes === 0 && seconds === 0) {
                    document.getElementById('message').style.display = 'block';
                } else if (minutes > 0 || hours > 0) {
                    document.getElementById('message').style.display = 'none';
                }
            }

            setInterval(updateTimer, 1000);
            updateTimer(); 

        } catch (error) {
            // Eğer bir hata çıkarsa ekrana ne olduğunu yazdıracak
            document.getElementById('target-info').innerText = "Kod hatası: " + error.message;
        }
    </script>
    </center>
</body>

</html>
