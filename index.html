    <style>
        body {body {
-moz-transform: scale(0.8, 0.8); /* Moz-browsers */
zoom: 0.8; /* Other non-webkit browsers */
zoom: 80%; /* Webkit browsers */
}
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;

        }
        .container {
            background: rgba(0, 0, 0, 0.4);
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #f1c40f;
        }
        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #ecf0f1;
        }
        .timer-box {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .time-part {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            min-width: 90px;
        }
        .time-part span.number {
            font-size: 4rem;
            font-weight: bold;
        }
        .time-part span.label {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
            color: #bdc3c7;
        }
        #message {
            font-size: 1.5rem;
            margin-top: 30px;
            color: #2ecc71;
            font-weight: bold;
            display: none;
        }

    </style>

        <h1>Eskişehir İftar Vakti</h1>
        <div class="subtitle" id="target-info">Hesaplanıyor...</div>
        
        <div class="timer-box" id="timer-box">
            <div class="time-part">
                <span class="number" id="hours">00</span>
                <span class="label">Saat</span>
            </div>
            <div class="time-part">
                <span class="number" id="minutes">00</span>
                <span class="label">Dakika</span>
            </div>
            <div class="time-part">
                <span class="number" id="seconds">00</span>
                <span class="label">Saniye</span>
            </div>
        </div>

        <div id="message">Hayırlı İftarlar! Allah kabul etsin.</div>
    </div>

    <script>
        try {
            // Eskişehir 2026 yılı 30 Günlük İftar Saatleri (Diyanet)
            // Tarihler tarayıcı uyumluluğu için eğik çizgi ile yazılmıştır (YYYY/AA/GG)
            const iftarTimes = [
                { date: "2026/02/19", time: "18:45:00" },
                { date: "2026/02/20", time: "18:46:00" },
                { date: "2026/02/21", time: "18:47:00" },
                { date: "2026/02/22", time: "18:48:00" },
                { date: "2026/02/23", time: "18:49:00" },
                { date: "2026/02/24", time: "18:51:00" },
                { date: "2026/02/25", time: "18:52:00" },
                { date: "2026/02/26", time: "18:53:00" },
                { date: "2026/02/27", time: "18:54:00" },
                { date: "2026/02/28", time: "18:55:00" },
                { date: "2026/03/01", time: "18:56:00" },
                { date: "2026/03/02", time: "18:57:00" },
                { date: "2026/03/03", time: "18:58:00" },
                { date: "2026/03/04", time: "18:59:00" },
                { date: "2026/03/05", time: "19:00:00" },
                { date: "2026/03/06", time: "19:01:00" },
                { date: "2026/03/07", time: "19:03:00" },
                { date: "2026/03/08", time: "19:04:00" },
                { date: "2026/03/09", time: "19:05:00" },
                { date: "2026/03/10", time: "19:06:00" },
                { date: "2026/03/11", time: "19:07:00" },
                { date: "2026/03/12", time: "19:08:00" },
                { date: "2026/03/13", time: "19:09:00" },
                { date: "2026/03/14", time: "19:10:00" },
                { date: "2026/03/15", time: "19:11:00" },
                { date: "2026/03/16", time: "19:12:00" },
                { date: "2026/03/17", time: "19:13:00" },
                { date: "2026/03/18", time: "19:14:00" },
                { date: "2026/03/19", time: "19:15:00" }
            ];

            function updateTimer() {
                const now = new Date();
                let targetIftar = null;
                let targetTimeString = "";

                for (let i = 0; i < iftarTimes.length; i++) {
                    // String birleştirme ile en güvenli tarih oluşturma yöntemi
                    const dateString = iftarTimes[i].date + " " + iftarTimes[i].time;
                    const iftarDate = new Date(dateString);
                    
                    if (now < iftarDate) {
                        targetIftar = iftarDate;
                        targetTimeString = iftarTimes[i].time.substring(0, 5);
                        break;
                    }
                }

                if (!targetIftar) {
                    document.getElementById('target-info').innerText = "Ramazan ayı iftar saatleri tamamlandı.";
                    document.getElementById('timer-box').style.display = 'none';
                    return;
                }

                document.getElementById('target-info').innerText = "Sıradaki İftar Vakti: " + targetTimeString;

                const diff = targetIftar - now;

                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById('hours').innerText = (hours < 10 ? "0" : "") + hours;
                document.getElementById('minutes').innerText = (minutes < 10 ? "0" : "") + minutes;
                document.getElementById('seconds').innerText = (seconds < 10 ? "0" : "") + seconds;

                if (hours === 0 && minutes === 0 && seconds === 0) {
                    document.getElementById('message').style.display = 'block';
                } else if (minutes > 0 || hours > 0) {
                    document.getElementById('message').style.display = 'none';
                }
            }

            setInterval(updateTimer, 1000);
            updateTimer(); 

        } catch (error) {
            // Eğer bir hata çıkarsa ekrana ne olduğunu yazdıracak
            document.getElementById('target-info').innerText = "Kod hatası: " + error.message;
        }
    </script>
